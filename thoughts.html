<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kunjal Ninad — Discretionary Equities Trader. Personal website with projects and contact info." />
  <title>🌴Kunjal Ninad</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.bunny.net/css?family=architects-daughter:400" rel="stylesheet" />

  <!-- Apply saved theme instantly before CSS loads -->
  <script>
    (() => {
      const theme = localStorage.getItem('theme') || 'light';
      document.documentElement.classList.add(theme + '-mode');
    })();
  </script>
</head>
<body>
  <aside class="sidebar" aria-label="Sidebar with profile and navigation">
    <img src="gojo.jpg" alt="Profile picture of Kunjal Ninad" class="profile-pic" />
    <h1>Kunjal Ninad</h1>
    <p class="subtitle">(he/hehe)</p>
    <nav aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="thoughts.html">→ Thoughts</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html">Contact</a>
    </nav>
  </aside>

  <main class="content">
    <div class="marquee" aria-hidden="true">
      <p>このサイトの作者は君よりトレードが上手い。読めない？じゃあ、トレードもできないね。はははは…。</p>
    </div>

    <h1>My Thoughts!</h1>
    <p>Sorry, I'm lazy. I don't have anything to write right now.
        
    </p>
  </main>

  <div class="theme-toggle" role="region" aria-label="Toggle light and dark mode">
    <button type="button" aria-pressed="false" id="toggle-light">🌞</button> | 
    <button type="button" aria-pressed="false" id="toggle-dark">🌙</button>
  </div>

  <script>
    const html = document.documentElement;
    const lightBtn = document.getElementById('toggle-light');
    const darkBtn = document.getElementById('toggle-dark');

    function setTheme(theme) {
      html.classList.remove('light-mode', 'dark-mode');
      html.classList.add(theme + '-mode');
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        darkBtn.setAttribute('aria-pressed', 'true');
        lightBtn.setAttribute('aria-pressed', 'false');
      } else {
        lightBtn.setAttribute('aria-pressed', 'true');
        darkBtn.setAttribute('aria-pressed', 'false');
      }
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    setTheme(savedTheme);

    lightBtn.addEventListener('click', () => setTheme('light'));
    darkBtn.addEventListener('click', () => setTheme('dark'));
  </script>
</body>
</html>
